<section class="categories-section">
  <div class="section-header">
    <h2>Nos Catégories</h2>
    <p>Explorez notre gamme complète de produits électroniques pour makers, étudiants et professionnels.</p>
  </div>

  <div class="categories-grid">
    @for (category of categories; track category.id) {

      <a [routerLink]="['/boutique']" [queryParams]="{ category: category.name }" class="category-card">

        <img [ngSrc]="category.image" [alt]="category.name" class="category-image" width="600" height="400">

        <div class="overlay"></div>

        <div class="category-content">
          <h3>{{ category.name }}</h3>
          <span class="product-count">{{ category.count }} produits &rarr;</span>
        </div>

      </a>
    }
  </div>
</section>
