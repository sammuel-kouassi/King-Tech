<div class="communaute-page">
  <header class="communaute-header">
  </header>

  <main class="communaute-main">
    <div class="search-actions" style="display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center;">
      <div class="search-bar" style="flex: 1; margin-bottom: 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Rechercher dans le forum..." [(ngModel)]="searchTerm">
      </div>
      <button class="btn-publier" (click)="creerDiscussion()" style="white-space: nowrap; padding: 0.8rem 1.5rem;">
        + Nouvelle discussion
      </button>
    </div>

    <div class="tabs-container">
      <button class="tab-btn" [class.active]="ongletActif === 'categories'" (click)="changerOnglet('categories')">Catégories</button>
      <button class="tab-btn" [class.active]="ongletActif === 'discussions'" (click)="changerOnglet('discussions')">Dernières Discussions</button>
      <button class="tab-btn" [class.active]="ongletActif === 'expert'" (click)="changerOnglet('expert')">Parler à un Expert</button>
    </div>

  </main>

  @if (showCreationModal) {
    <div class="modal-overlay" (click)="fermerModal()">
      <div class="modal-content" (click)="$event.stopPropagation()" style="max-width: 600px; border-radius: 15px; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 style="font-family: 'Playfair Display', serif; margin: 0; color: #1e293b;">Démarrer un sujet</h2>
          <button (click)="fermerModal()" style="background: none; border: none; font-size: 1.8rem; color: #94a3b8; cursor: pointer;">&times;</button>
        </div>

        <form (submit)="publierSujet()">
          <div style="margin-bottom: 1.2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569;">Titre</label>
            <input type="text" name="titre" [(ngModel)]="nouveauSujet.titre" placeholder="De quoi voulez-vous parler ?" style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px;">
          </div>

          <div style="margin-bottom: 1.2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569;">Catégorie</label>
            <select name="cat" [(ngModel)]="nouveauSujet.categorieId" style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px;">
              <option value="" disabled>Choisir une catégorie</option>
              @for (cat of categories; track cat.id) {
                <option [value]="cat.id">{{ cat.nom }}</option>
              }
            </select>
          </div>

          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569;">Votre message</label>
            <textarea name="msg" [(ngModel)]="nouveauSujet.message" rows="5" style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; resize: none;"></textarea>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 1rem;">
            <button type="button" class="btn-annuler" (click)="fermerModal()">Annuler</button>
            <button type="submit" class="btn-publier">Publier</button>
          </div>
        </form>
      </div>
    </div>
  }

  @if (showLoginPrompt) {
  }
</div>
