<section class="newsletter-section">
  <div class="newsletter-container">

    <h2>Restez informé</h2>
    <p>Inscrivez-vous pour recevoir nos offres exclusives et les dernières nouveautés.</p>

    <form class="newsletter-form" (submit)="onSubmit($event)">
      <input type="email" placeholder="Votre email" required aria-label="Adresse email">
      <button type="submit">S'inscrire</button>
    </form>

  </div>
</section>
