<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/" (click)="closeMobileMenu()" class="navbar-logo-link">
      <img src="assets/images/logo-king-technbg.png" alt="KING-TECH Logo" class="navbar-logo-img">
    </a>
  </div>
  <ul class="navbar-nav" [class.mobile-open]="isMobileMenuOpen">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Accueil</a></li>
    <li><a routerLink="/boutique" routerLinkActive="active" (click)="closeMobileMenu()">Boutique</a></li>
    <li><a routerLink="/communaute" routerLinkActive="active" (click)="closeMobileMenu()">Communauté</a></li>
    <li><a routerLink="/formation" routerLinkActive="active" (click)="closeMobileMenu()">Formation</a></li>
  </ul>

  <div class="navbar-icons">

    @if (!isSearchActive) {
      <button class="icon-btn" aria-label="Recherche" (click)="toggleSearch()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    } @else {
      <div class="navbar-search-active">
        <input type="text" placeholder="Rechercher..." class="nav-search-input" autofocus>
        <button class="icon-btn close-search-btn" aria-label="Fermer" (click)="toggleSearch()">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    }

    <button class="icon-btn cart-btn-container" aria-label="Panier" (click)="cartService.toggleCart()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>

      @if (cartService.cartCount() > 0) {
        <span class="cart-badge">{{ cartService.cartCount() }}</span>
      }
    </button>

    <button class="icon-btn hamburger-btn" aria-label="Menu" (click)="toggleMobileMenu()">
      @if (!isMobileMenuOpen) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      }
    </button>

  </div>
</nav>
